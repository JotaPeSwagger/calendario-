<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Calendário de Tarefas e Treino</title>

<!-- PWA: comportamento de app instalado no iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendário">
<meta name="theme-color" content="#0b0c14">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0b0c14;
    --bg-glow-1: radial-gradient(circle at 15% 0%, rgba(123,92,255,0.18), transparent 45%);
    --bg-glow-2: radial-gradient(circle at 90% 20%, rgba(255,107,87,0.12), transparent 40%);
    --surface: #15172459;
    --surface-solid: #161829;
    --surface-2: #1d2036;
    --surface-3: #242842;
    --border: #2c2f4a;
    --border-strong: #3d4166;
    --text: #f1f1f8;
    --text-secondary: #a4a6c4;
    --text-muted: #6b6e94;

    --accent: #7b5cff;
    --accent-2: #ff6b57;
    --accent-glow: rgba(123,92,255,0.45);

    --cat-estudo: #4fb6ff;
    --cat-estudo-bg: #16263d;
    --cat-trabalho: #b388ff;
    --cat-trabalho-bg: #241c3d;
    --cat-pessoal: #38e0b0;
    --cat-pessoal-bg: #14302a;
    --cat-saude: #ff8a5c;
    --cat-saude-bg: #34201a;

    --treino: #ff5d8f;
    --treino-2: #ffb454;

    --receita: #2ee6a8;
    --receita-bg: #0f3328;
    --gasto: #ff5c6e;
    --gasto-bg: #341622;
    --financas: #2ee6a8;

    --radius: 14px;
    --shadow-pop: 0 20px 60px rgba(0,0,0,0.55);
  }
  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    background-image: var(--bg-glow-1), var(--bg-glow-2);
    background-attachment: fixed;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: max(1.1rem, env(safe-area-inset-top)) 1rem max(2.5rem, env(safe-area-inset-bottom));
    min-height: 100vh;
    position: relative;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 0 16px 2px var(--accent-glow); }
    50% { box-shadow: 0 0 0 2px var(--accent), 0 0 26px 6px var(--accent-glow); }
  }
  @keyframes spinIn {
    from { transform: rotate(-8deg) scale(0.85); opacity: 0; }
    to { transform: rotate(0) scale(1); opacity: 1; }
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.1rem;
    animation: fadeUp 0.4s ease;
  }
  .header .month-title {
    font-size: 19px;
    font-weight: 700;
    text-transform: capitalize;
    background: linear-gradient(90deg, var(--accent), var(--treino));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .icon-btn:active { transform: scale(0.9); background: var(--surface-3); }
  .icon-btn:hover { border-color: var(--border-strong); }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekdays span {
    text-align: center;
    font-size: 10.5px;
    color: var(--text-muted);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-cell {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 6px 2px;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    animation: fadeUp 0.45s ease backwards;
  }
  .day-cell:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .day-cell:active { transform: scale(0.92); }
  .day-cell.out { opacity: 0; cursor: default; pointer-events: none; }
  .day-cell.today {
    border: 1.5px solid var(--accent);
    animation: glowPulse 2.6s ease-in-out infinite, fadeUp 0.45s ease backwards;
  }
  .day-num { font-size: 13px; color: var(--text); }
  .day-cell.today .day-num { font-weight: 700; color: #c9bbff; }
  .dots { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
  .dot.workout-flag {
    width: 6px; height: 6px; border-radius: 2px;
    background: var(--treino);
    box-shadow: 0 0 6px var(--treino);
  }
  .dot.finance-flag {
    width: 6px; height: 6px;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    background: var(--financas);
    box-shadow: 0 0 6px var(--financas);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,4,10,0);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.1rem;
    pointer-events: none;
    transition: background 0.3s ease;
    backdrop-filter: blur(0px);
  }
  .overlay.active {
    background: rgba(4,4,10,0.65);
    pointer-events: auto;
    backdrop-filter: blur(3px);
  }
  .zoom-card {
    position: fixed;
    background: var(--surface-solid);
    background-image: linear-gradient(160deg, rgba(123,92,255,0.08), transparent 50%);
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-pop);
    overflow: hidden;
    transition: top 0.34s cubic-bezier(.16,1,.3,1), left 0.34s cubic-bezier(.16,1,.3,1),
                width 0.34s cubic-bezier(.16,1,.3,1), height 0.34s cubic-bezier(.16,1,.3,1),
                border-radius 0.34s ease;
    display: flex;
    flex-direction: column;
    z-index: 51;
  }
  .zoom-card.expanded { border-radius: 20px; }
  .zoom-inner {
    padding: 1.1rem 1.15rem 1.3rem;
    overflow-y: auto;
    flex: 1;
    opacity: 0;
    transition: opacity 0.22s ease 0.05s;
    display: flex;
    flex-direction: column;
  }
  .zoom-inner.show { opacity: 1; }
  .zoom-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .zoom-head .title { font-size: 16px; font-weight: 700; text-transform: capitalize; }
  .close-zoom {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .close-zoom:active { transform: scale(0.88) rotate(90deg); }

  /* tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: var(--surface-2);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 0;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    transition: color 0.2s ease, background 0.25s cubic-bezier(.2,.8,.2,1), transform 0.15s ease;
  }
  .tab-btn:active { transform: scale(0.96); }
  .tab-btn.active.tab-tarefas { background: linear-gradient(135deg, #5b3df0, #7b5cff); color: white; box-shadow: 0 4px 16px rgba(123,92,255,0.4); }
  .tab-btn.active.tab-treino { background: linear-gradient(135deg, #ff5d8f, #ff8a5c); color: white; box-shadow: 0 4px 16px rgba(255,93,143,0.4); }
  .tab-btn.active.tab-financas { background: linear-gradient(135deg, #1fb88e, #2ee6a8); color: #06251c; box-shadow: 0 4px 16px rgba(46,230,168,0.35); }

  .pane { animation: fadeUp 0.28s ease; }

  /* tasks */
  .task-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 11px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 7px;
    background: var(--surface-2);
    animation: fadeUp 0.3s ease backwards;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }
  .task-row:active { transform: scale(0.99); }
  .check-btn {
    width: 23px; height: 23px; min-width: 23px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
    font-size: 13px;
    color: white;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), background 0.2s ease, border-color 0.2s ease;
  }
  .check-btn.done { background: linear-gradient(135deg, #38e0b0, #1fb88e); border-color: #1fb88e; transform: scale(1.05); }
  .check-btn:active { transform: scale(0.85); }
  .cat-pill {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 7px;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .task-title {
    flex: 1;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .task-title.done { text-decoration: line-through; color: var(--text-muted); }
  .task-time { font-size: 11.5px; color: var(--text-secondary); white-space: nowrap; font-weight: 600; }
  .mini-btn {
    width: 27px; height: 27px;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    flex-shrink: 0;
    border-radius: 8px;
    transition: color 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }
  .mini-btn:hover { color: var(--text); background: var(--surface-3); }
  .mini-btn:active { transform: scale(0.85); }

  .empty-msg {
    font-size: 13.5px;
    color: var(--text-secondary);
    margin: 4px 0 14px;
    text-align: center;
    padding: 18px 10px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    animation: fadeUp 0.3s ease;
  }
  .add-btn {
    width: 100%;
    padding: 11px;
    border: 1px dashed var(--border-strong);
    border-radius: 12px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .add-btn:active { transform: scale(0.98); }
  .add-btn.tarefas:hover { border-color: var(--accent); color: var(--accent); background: rgba(123,92,255,0.08); }
  .add-btn.treino:hover { border-color: var(--treino); color: var(--treino); background: rgba(255,93,143,0.08); }
  .add-btn.financas:hover { border-color: var(--financas); color: var(--financas); background: rgba(46,230,168,0.08); }

  .form-wrap {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.25s ease;
  }
  input[type="text"], input[type="time"], input[type="number"], select, textarea {
    width: 100%;
    padding: 0 11px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-3);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  textarea { height: auto; padding: 9px 11px; min-height: 56px; resize: vertical; line-height: 1.4; }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(123,92,255,0.18);
  }
  .row-2 { display: flex; gap: 8px; }
  .row-3 { display: flex; gap: 8px; }
  .row-2 > *, .row-3 > * { flex: 1; min-width: 0; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .field-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: -4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .btn {
    height: 38px;
    padding: 0 16px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .btn.primary.tarefas { background: linear-gradient(135deg, #5b3df0, #7b5cff); border-color: transparent; color: white; }
  .btn.primary.treino { background: linear-gradient(135deg, #ff5d8f, #ff8a5c); border-color: transparent; color: white; }
  .btn.primary.financas { background: linear-gradient(135deg, #1fb88e, #2ee6a8); border-color: transparent; color: #06251c; }
  .btn:active { transform: scale(0.95); filter: brightness(0.95); }

  /* finance type toggle */
  .type-toggle {
    display: flex;
    gap: 8px;
  }
  .type-toggle button {
    flex: 1;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-3);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  .type-toggle button:active { transform: scale(0.96); }
  .type-toggle button.sel-receita { background: linear-gradient(135deg, #1fb88e, #2ee6a8); border-color: transparent; color: #06251c; }
  .type-toggle button.sel-gasto { background: linear-gradient(135deg, #d33f50, #ff5c6e); border-color: transparent; color: white; }

  /* workout cards */
  .exercise-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: linear-gradient(160deg, rgba(255,93,143,0.07), var(--surface-2) 55%);
    padding: 12px 13px;
    margin-bottom: 9px;
    animation: popIn 0.3s cubic-bezier(.2,.8,.2,1) backwards;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }
  .exercise-card:active { transform: scale(0.99); }
  .exercise-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .exercise-name { font-size: 14.5px; font-weight: 700; color: var(--text); }
  .exercise-actions { display: flex; gap: 2px; }
  .exercise-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface-3);
    border-radius: 9px;
    padding: 5px 12px;
    min-width: 52px;
  }
  .stat-chip .stat-val { font-size: 14px; font-weight: 700; color: var(--treino-2); }
  .stat-chip .stat-lbl { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; margin-top: 1px; }
  .exercise-note {
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--text-secondary);
    font-style: italic;
    border-left: 2px solid var(--border-strong);
    padding-left: 8px;
    line-height: 1.4;
  }

  /* finance */
  @keyframes countPop {
    0% { transform: scale(0.85); opacity: 0.4; }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  .finance-summary {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .summary-card {
    flex: 1;
    border-radius: 13px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    padding: 10px 12px;
    animation: fadeUp 0.3s ease backwards;
  }
  .summary-card .summary-lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .summary-card .summary-val {
    font-size: 17px;
    font-weight: 800;
    display: inline-block;
    animation: countPop 0.4s cubic-bezier(.2,.8,.2,1);
  }
  .summary-val.pos { color: var(--receita); }
  .summary-val.neg { color: var(--gasto); }
  .summary-val.zero { color: var(--text-secondary); }

  .transaction-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 11px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 7px;
    background: var(--surface-2);
    animation: fadeUp 0.3s ease backwards;
    transition: transform 0.15s ease;
  }
  .transaction-row:active { transform: scale(0.99); }
  .tx-icon {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    font-weight: 800;
  }
  .tx-icon.receita { background: var(--receita-bg); color: var(--receita); }
  .tx-icon.gasto { background: var(--gasto-bg); color: var(--gasto); }
  .tx-desc {
    flex: 1;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .tx-value {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tx-value.receita { color: var(--receita); }
  .tx-value.gasto { color: var(--gasto); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const CATS = [
  { id: 'estudo', label: 'Estudo', color: 'var(--cat-estudo)', bg: 'var(--cat-estudo-bg)' },
  { id: 'trabalho', label: 'Trabalho', color: 'var(--cat-trabalho)', bg: 'var(--cat-trabalho-bg)' },
  { id: 'pessoal', label: 'Pessoal', color: 'var(--cat-pessoal)', bg: 'var(--cat-pessoal-bg)' },
  { id: 'saude', label: 'Saúde', color: 'var(--cat-saude)', bg: 'var(--cat-saude-bg)' },
];
const CAT_MAP = Object.fromEntries(CATS.map(c => [c.id, c]));
const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const WEEKDAYS = ['dom','seg','ter','qua','qui','sex','sáb'];
const STORAGE_KEY = 'calendario_tarefas_v2';

function pad(n){ return n < 10 ? '0'+n : ''+n; }
function dateKey(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function uid(){ return Math.random().toString(36).slice(2,9); }

function loadData(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? migrateData(JSON.parse(raw)) : { tasks: {}, workouts: {}, financas: {} };
  } catch(e) { return { tasks: {}, workouts: {}, financas: {} }; }
}
function migrateData(data){
  if (!data.financas) data.financas = {};
  if (!data.tasks) data.tasks = {};
  if (!data.workouts) data.workouts = {};
  return data;
}
function saveData(data){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let state = {
  viewY: new Date().getFullYear(),
  viewM: new Date().getMonth(),
  data: loadData(),
  selectedDay: null,
  zoomRect: null,
  zoomPhase: 'closed',
  activeTab: 'tarefas',  // tarefas | treino
  formMode: null,        // null | 'new' | object being edited
};

window.requestAnimationFrame = window.requestAnimationFrame || function(cb){ return setTimeout(cb, 16); };

const root = document.getElementById('app');

function render(){
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  const firstOfMonth = new Date(state.viewY, state.viewM, 1);
  const startOffset = firstOfMonth.getDay();
  const daysInMonth = new Date(state.viewY, state.viewM+1, 0).getDate();
  const daysInPrevMonth = new Date(state.viewY, state.viewM, 0).getDate();

  let cells = [];
  for (let i=0;i<startOffset;i++){
    cells.push({ d: daysInPrevMonth - startOffset + 1 + i, inMonth:false, key:null });
  }
  for (let d=1; d<=daysInMonth; d++){
    cells.push({ d, inMonth:true, key: dateKey(state.viewY, state.viewM, d) });
  }
  while (cells.length % 7 !== 0){
    cells.push({ d: cells.length, inMonth:false, key:null });
  }

  const html = `
    <div class="header">
      <button class="icon-btn" id="prevMonth" aria-label="Mês anterior">&#8249;</button>
      <div class="month-title">${MONTHS[state.viewM]} de ${state.viewY}</div>
      <button class="icon-btn" id="nextMonth" aria-label="Próximo mês">&#8250;</button>
    </div>
    <div class="weekdays">${WEEKDAYS.map(w => `<span>${w}</span>`).join('')}</div>
    <div class="grid" id="grid">
      ${cells.map((c, i) => {
        if (!c.inMonth) return `<div class="day-cell out"></div>`;
        const tasks = state.data.tasks[c.key] || [];
        const workout = state.data.workouts[c.key] || [];
        const financas = state.data.financas[c.key] || [];
        const isToday = c.key === todayKey;
        const dots = tasks.slice(0,3).map(t => {
          const cat = CAT_MAP[t.cat] || CATS[0];
          return `<span class="dot" style="background:${cat.color}; color:${cat.color}; opacity:${t.done ? 0.35 : 1}"></span>`;
        }).join('');
        const workoutDot = workout.length > 0 ? `<span class="dot workout-flag"></span>` : '';
        const financeDot = financas.length > 0 ? `<span class="dot finance-flag"></span>` : '';
        return `<div class="day-cell${isToday ? ' today':''}" data-key="${c.key}" style="animation-delay:${(i%7)*0.02}s">
          <span class="day-num">${c.d}</span>
          <div class="dots">${dots}${workoutDot}${financeDot}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="overlay" id="overlay"></div>
  `;
  root.innerHTML = html;

  document.getElementById('prevMonth').onclick = () => { changeMonth(-1); };
  document.getElementById('nextMonth').onclick = () => { changeMonth(1); };

  document.querySelectorAll('.day-cell[data-key]').forEach(el => {
    el.onclick = () => openDay(el.dataset.key, el);
  });

  document.getElementById('overlay').onclick = (e) => {
    if (e.target.id === 'overlay') closeDay();
  };

  if (state.selectedDay && state.zoomPhase !== 'closed') {
    renderZoomCard();
  }
}

function changeMonth(delta){
  let m = state.viewM + delta, y = state.viewY;
  if (m < 0){ m = 11; y -= 1; }
  if (m > 11){ m = 0; y += 1; }
  state.viewM = m; state.viewY = y;
  render();
}

function openDay(key, cellEl){
  const rect = cellEl.getBoundingClientRect();
  state.selectedDay = key;
  state.formMode = null;
  state.activeTab = 'tarefas';
  state.zoomRect = { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
  state.zoomPhase = 'opening';
  render();

  requestAnimationFrame(() => {
    const overlay = document.getElementById('overlay');
    const card = document.getElementById('zoomCard');
    if (overlay) overlay.classList.add('active');
    if (card) {
      const target = targetRect();
      card.style.top = target.top + 'px';
      card.style.left = target.left + 'px';
      card.style.width = target.width + 'px';
      card.style.height = target.height + 'px';
      card.classList.add('expanded');
    }
    setTimeout(() => {
      state.zoomPhase = 'open';
      const inner = document.getElementById('zoomInner');
      if (inner) inner.classList.add('show');
    }, 340);
  });
}

function targetRect(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = 18;
  const maxWidth = Math.min(480, vw - margin*2);
  const maxHeight = Math.min(640, vh - margin*2);
  return {
    top: (vh - maxHeight) / 2,
    left: (vw - maxWidth) / 2,
    width: maxWidth,
    height: maxHeight
  };
}

function closeDay(){
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('zoomCard');
  const inner = document.getElementById('zoomInner');
  if (inner) inner.classList.remove('show');
  if (overlay) overlay.classList.remove('active');
  if (card && state.zoomRect) {
    card.style.top = state.zoomRect.top + 'px';
    card.style.left = state.zoomRect.left + 'px';
    card.style.width = state.zoomRect.width + 'px';
    card.style.height = state.zoomRect.height + 'px';
    card.classList.remove('expanded');
  }
  setTimeout(() => {
    state.selectedDay = null;
    state.zoomRect = null;
    state.zoomPhase = 'closed';
    state.formMode = null;
    render();
  }, 320);
}

function renderZoomCard(){
  const overlay = document.getElementById('overlay');
  if (!overlay) return;
  const r = state.zoomRect;

  let card = document.getElementById('zoomCard');
  if (!card) {
    card = document.createElement('div');
    card.id = 'zoomCard';
    card.className = 'zoom-card';
    card.style.top = r.top + 'px';
    card.style.left = r.left + 'px';
    card.style.width = r.width + 'px';
    card.style.height = r.height + 'px';
    overlay.appendChild(card);
  }

  card.innerHTML = `
    <div class="zoom-inner" id="zoomInner">
      <div class="zoom-head">
        <span class="title">${formatDayTitle(state.selectedDay)}</span>
        <button class="close-zoom" id="closeZoomBtn" aria-label="Fechar">&times;</button>
      </div>
      <div class="tabs">
        <button class="tab-btn tab-tarefas ${state.activeTab === 'tarefas' ? 'active' : ''}" id="tabTarefas">&#128203; Tarefas</button>
        <button class="tab-btn tab-treino ${state.activeTab === 'treino' ? 'active' : ''}" id="tabTreino">&#128170; Treino</button>
        <button class="tab-btn tab-financas ${state.activeTab === 'financas' ? 'active' : ''}" id="tabFinancas">&#128176; Finanças</button>
      </div>
      <div id="paneContent"></div>
    </div>
  `;
  if (state.zoomPhase === 'open') {
    document.getElementById('zoomInner').classList.add('show');
  }

  document.getElementById('closeZoomBtn').onclick = closeDay;
  document.getElementById('tabTarefas').onclick = () => { state.activeTab = 'tarefas'; state.formMode = null; renderZoomCard(); };
  document.getElementById('tabTreino').onclick = () => { state.activeTab = 'treino'; state.formMode = null; renderZoomCard(); };
  document.getElementById('tabFinancas').onclick = () => { state.activeTab = 'financas'; state.formMode = null; renderZoomCard(); };

  const paneEl = document.getElementById('paneContent');
  paneEl.innerHTML = state.activeTab === 'tarefas' ? tarefasPaneHtml() : (state.activeTab === 'treino' ? treinoPaneHtml() : financasPaneHtml());
  paneEl.className = 'pane';


  if (state.activeTab === 'tarefas') wireTarefasPane();
  else if (state.activeTab === 'treino') wireTreinoPane();
  else wireFinancasPane();
}

/* ---------- TAREFAS ---------- */

function tarefasPaneHtml(){
  const tasks = (state.data.tasks[state.selectedDay] || []).slice().sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
  return `
    <div id="taskListWrap">
      ${tasks.length === 0 ? '<p class="empty-msg">Nenhuma tarefa neste dia.</p>' : tasks.map(t => taskRowHtml(t)).join('')}
    </div>
    <div id="formArea">${tarefaFormAreaHtml()}</div>
  `;
}

function taskRowHtml(t){
  const cat = CAT_MAP[t.cat] || CATS[0];
  return `
    <div class="task-row">
      <button class="check-btn ${t.done ? 'done' : ''}" id="check-${t.id}" aria-label="Concluída">${t.done ? '&#10003;' : ''}</button>
      <span class="cat-pill" style="background:${cat.bg}; color:${cat.color}">${cat.label}</span>
      ${t.time ? `<span class="task-time">${t.time}</span>` : ''}
      <span class="task-title ${t.done ? 'done' : ''}">${escapeHtml(t.title)}</span>
      <button class="mini-btn" id="edit-${t.id}" aria-label="Editar">&#9998;</button>
      <button class="mini-btn" id="del-${t.id}" aria-label="Excluir">&#128465;</button>
    </div>
  `;
}

function tarefaFormAreaHtml(){
  if (state.formMode === null) {
    return `<button class="add-btn tarefas" id="addTaskBtn">+ Adicionar tarefa</button>`;
  }
  const editing = state.formMode !== 'new' ? state.formMode : null;
  return `
    <div class="form-wrap">
      <input type="text" id="taskTitleInput" placeholder="Nome da tarefa" value="${editing ? escapeHtml(editing.title) : ''}">
      <div class="row-2">
        <input type="time" id="taskTimeInput" value="${editing && editing.time ? editing.time : ''}">
        <select id="taskCatInput">
          ${CATS.map(c => `<option value="${c.id}" ${editing && editing.cat === c.id ? 'selected' : ''}>${c.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-actions">
        <button class="btn" id="cancelFormBtn">Cancelar</button>
        <button class="btn primary tarefas" id="saveFormBtn">${editing ? 'Salvar' : 'Adicionar'}</button>
      </div>
    </div>
  `;
}

function wireTarefasPane(){
  const tasks = state.data.tasks[state.selectedDay] || [];
  tasks.forEach(t => {
    const c = document.getElementById('check-' + t.id);
    if (c) c.onclick = () => toggleDone(t.id);
    const e = document.getElementById('edit-' + t.id);
    if (e) e.onclick = () => { state.formMode = t; renderZoomCard(); };
    const d = document.getElementById('del-' + t.id);
    if (d) d.onclick = () => deleteTask(t.id);
  });

  const addBtn = document.getElementById('addTaskBtn');
  if (addBtn) addBtn.onclick = () => { state.formMode = 'new'; renderZoomCard();
    setTimeout(() => { const i = document.getElementById('taskTitleInput'); if (i) i.focus(); }, 0);
  };
  const cancelBtn = document.getElementById('cancelFormBtn');
  if (cancelBtn) cancelBtn.onclick = () => { state.formMode = null; renderZoomCard(); };
  const saveBtn = document.getElementById('saveFormBtn');
  if (saveBtn) saveBtn.onclick = saveTaskFromForm;
  const titleInput = document.getElementById('taskTitleInput');
  if (titleInput) {
    titleInput.focus();
    titleInput.onkeydown = (e) => { if (e.key === 'Enter') saveTaskFromForm(); };
  }
}

function saveTaskFromForm(){
  const titleEl = document.getElementById('taskTitleInput');
  const timeEl = document.getElementById('taskTimeInput');
  const catEl = document.getElementById('taskCatInput');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const editing = state.formMode !== 'new' ? state.formMode : null;
  const task = {
    id: editing ? editing.id : uid(),
    title,
    time: timeEl.value || null,
    cat: catEl.value,
    done: editing ? editing.done : false
  };
  const list = state.data.tasks[state.selectedDay] ? [...state.data.tasks[state.selectedDay]] : [];
  const idx = list.findIndex(x => x.id === task.id);
  if (idx >= 0) list[idx] = task; else list.push(task);
  state.data.tasks[state.selectedDay] = list;
  saveData(state.data);
  state.formMode = null;
  renderZoomCard();
  renderGridDotsOnly();
}

function toggleDone(taskId){
  const list = (state.data.tasks[state.selectedDay] || []).map(t => t.id === taskId ? {...t, done: !t.done} : t);
  state.data.tasks[state.selectedDay] = list;
  saveData(state.data);
  renderZoomCard();
  renderGridDotsOnly();
}

function deleteTask(taskId){
  let list = (state.data.tasks[state.selectedDay] || []).filter(t => t.id !== taskId);
  if (list.length === 0) delete state.data.tasks[state.selectedDay];
  else state.data.tasks[state.selectedDay] = list;
  saveData(state.data);
  renderZoomCard();
  renderGridDotsOnly();
}

function deleteExercise(exId){

/* ---------- FINANÇAS ---------- */

function formatBRL(value){
  const sign = value < 0 ? '-' : '';
  const abs = Math.abs(value);
  return sign + 'R$ ' + abs.toFixed(2).replace('.', ',');
}

function monthTotal(){
  let total = 0;
  Object.keys(state.data.financas).forEach(key => {
    const [y, m] = key.split('-').map(Number);
    if (y === state.viewY && (m - 1) === state.viewM) {
      (state.data.financas[key] || []).forEach(tx => {
        total += tx.tipo === 'receita' ? tx.valor : -tx.valor;
      });
    }
  });
  return total;
}

function dayTotal(){
  const txs = state.data.financas[state.selectedDay] || [];
  return txs.reduce((sum, tx) => sum + (tx.tipo === 'receita' ? tx.valor : -tx.valor), 0);
}

function financasPaneHtml(){
  const txs = (state.data.financas[state.selectedDay] || []);
  const dTotal = dayTotal();
  const mTotal = monthTotal();
  const dClass = dTotal > 0 ? 'pos' : (dTotal < 0 ? 'neg' : 'zero');
  const mClass = mTotal > 0 ? 'pos' : (mTotal < 0 ? 'neg' : 'zero');
  return `
    <div class="finance-summary">
      <div class="summary-card" style="animation-delay:0s">
        <div class="summary-lbl">Saldo do dia</div>
        <div class="summary-val ${dClass}">${formatBRL(dTotal)}</div>
      </div>
      <div class="summary-card" style="animation-delay:0.05s">
        <div class="summary-lbl">Saldo do mês</div>
        <div class="summary-val ${mClass}">${formatBRL(mTotal)}</div>
      </div>
    </div>
    <div id="txListWrap">
      ${txs.length === 0 ? '<p class="empty-msg">Nenhuma movimentação neste dia.</p>' : txs.map(tx => txRowHtml(tx)).join('')}
    </div>
    <div id="formArea">${financaFormAreaHtml()}</div>
  `;
}

function txRowHtml(tx){
  const isReceita = tx.tipo === 'receita';
  return `
    <div class="transaction-row">
      <div class="tx-icon ${tx.tipo}">${isReceita ? '+' : '–'}</div>
      <span class="tx-desc">${escapeHtml(tx.desc)}</span>
      <span class="tx-value ${tx.tipo}">${isReceita ? '+' : '-'} ${formatBRL(tx.valor)}</span>
      <button class="mini-btn" id="edit-tx-${tx.id}" aria-label="Editar">&#9998;</button>
      <button class="mini-btn" id="del-tx-${tx.id}" aria-label="Excluir">&#128465;</button>
    </div>
  `;
}

function financaFormAreaHtml(){
  if (state.formMode === null) {
    return `<button class="add-btn financas" id="addTxBtn">+ Adicionar movimentação</button>`;
  }
  const isNew = state.formMode === 'new' || !state.formMode.id;
  const editing = (!isNew) ? state.formMode : null;
  const draft = (state.formMode === 'new') ? null : state.formMode;
  const tipo = (draft && draft.tipo) ? draft.tipo : 'gasto';
  return `
    <div class="form-wrap">
      <div class="type-toggle">
        <button type="button" id="typeReceitaBtn" class="${tipo === 'receita' ? 'sel-receita' : ''}">&#128176; Receita</button>
        <button type="button" id="typeGastoBtn" class="${tipo === 'gasto' ? 'sel-gasto' : ''}">&#128181; Gasto</button>
      </div>
      <input type="text" id="txDescInput" placeholder="Descrição (ex: Mercado, Salário)" value="${draft && draft.desc ? escapeHtml(draft.desc) : ''}">
      <input type="number" id="txValorInput" placeholder="Valor (ex: 49.90)" min="0" step="0.01" value="${draft && draft.valor ? draft.valor : ''}">
      <div class="form-actions">
        <button class="btn" id="cancelTxFormBtn">Cancelar</button>
        <button class="btn primary financas" id="saveTxFormBtn">${editing ? 'Salvar' : 'Adicionar'}</button>
      </div>
    </div>
  `;
}

function wireFinancasPane(){
  const txs = state.data.financas[state.selectedDay] || [];
  txs.forEach(tx => {
    const e = document.getElementById('edit-tx-' + tx.id);
    if (e) e.onclick = () => { state.formMode = tx; renderZoomCard(); };
    const d = document.getElementById('del-tx-' + tx.id);
    if (d) d.onclick = () => deleteTx(tx.id);
  });

  const addBtn = document.getElementById('addTxBtn');
  if (addBtn) addBtn.onclick = () => { state.formMode = 'new'; renderZoomCard();
    setTimeout(() => { const i = document.getElementById('txDescInput'); if (i) i.focus(); }, 0);
  };
  const cancelBtn = document.getElementById('cancelTxFormBtn');
  if (cancelBtn) cancelBtn.onclick = () => { state.formMode = null; renderZoomCard(); };
  const saveBtn = document.getElementById('saveTxFormBtn');
  if (saveBtn) saveBtn.onclick = saveTxFromForm;

  const receitaBtn = document.getElementById('typeReceitaBtn');
  const gastoBtn = document.getElementById('typeGastoBtn');
  if (receitaBtn) receitaBtn.onclick = () => { setFormTipo('receita'); };
  if (gastoBtn) gastoBtn.onclick = () => { setFormTipo('gasto'); };

  const descInput = document.getElementById('txDescInput');
  if (descInput) descInput.focus();
}

function setFormTipo(tipo){
  const descInput = document.getElementById('txDescInput');
  const valorInput = document.getElementById('txValorInput');
  const draftDesc = descInput ? descInput.value : '';
  const draftValor = valorInput ? valorInput.value : '';

  if (state.formMode === 'new') {
    state.formMode = { id: null, desc: draftDesc, valor: draftValor, tipo };
  } else {
    state.formMode = { ...state.formMode, desc: draftDesc, valor: draftValor, tipo };
  }
  renderZoomCard();
  const d = document.getElementById('txDescInput');
  const v = document.getElementById('txValorInput');
  if (d) { d.value = draftDesc; d.focus(); }
  if (v) v.value = draftValor;
}

function saveTxFromForm(){
  const descEl = document.getElementById('txDescInput');
  const valorEl = document.getElementById('txValorInput');
  const desc = descEl.value.trim();
  const valor = parseFloat(valorEl.value);
  if (!desc) { descEl.focus(); return; }
  if (isNaN(valor) || valor <= 0) { valorEl.focus(); return; }

  const editing = (state.formMode !== 'new' && state.formMode && state.formMode.id) ? state.formMode : null;
  const tipoSelected = (state.formMode && state.formMode.tipo) ? state.formMode.tipo : 'gasto';

  const tx = {
    id: editing ? editing.id : uid(),
    desc,
    valor,
    tipo: tipoSelected
  };
  const list = state.data.financas[state.selectedDay] ? [...state.data.financas[state.selectedDay]] : [];
  const idx = list.findIndex(x => x.id === tx.id);
  if (idx >= 0) list[idx] = tx; else list.push(tx);
  state.data.financas[state.selectedDay] = list;
  saveData(state.data);
  state.formMode = null;
  renderZoomCard();
  renderGridDotsOnly();
}

function deleteTx(txId){
  let list = (state.data.financas[state.selectedDay] || []).filter(x => x.id !== txId);
  if (list.length === 0) delete state.data.financas[state.selectedDay];
  else state.data.financas[state.selectedDay] = list;
  saveData(state.data);
  renderZoomCard();
  renderGridDotsOnly();
}

/* ---------- shared ---------- */

function renderGridDotsOnly(){
  document.querySelectorAll('.day-cell[data-key]').forEach(el => {
    const key = el.dataset.key;
    const tasks = state.data.tasks[key] || [];
    const workout = state.data.workouts[key] || [];
    const dotsWrap = el.querySelector('.dots');
    if (dotsWrap) {
      const taskDots = tasks.slice(0,3).map(t => {
        const cat = CAT_MAP[t.cat] || CATS[0];
        return `<span class="dot" style="background:${cat.color}; color:${cat.color}; opacity:${t.done ? 0.35 : 1}"></span>`;
      }).join('');
      const workoutDot = workout.length > 0 ? `<span class="dot workout-flag"></span>` : '';
      dotsWrap.innerHTML = taskDots + workoutDot;
    }
  });
}

function formatDayTitle(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const wd = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'][dt.getDay()];
  return `${d} de ${MONTHS[m-1]} (${wd})`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

render();
</script>
</body>
